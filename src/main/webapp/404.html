<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>404 - 页面未找到</title>
    <link rel="stylesheet" href="static/css/theme.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--bg-primary);
        }
        .error-code {
            font-size: 120px;
            font-weight: 600;
            color: var(--accent-blue);
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-msg {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <div class="error-msg">页面未找到</div>
        <a href="index.html" class="btn btn-primary">返回首页</a>
    </div>
</body>
</html>
